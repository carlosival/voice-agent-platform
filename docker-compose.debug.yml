name: voice-ai-stack

# ─────────────────────────────────────────────
# Shared GPU access via CDI (best for RTX 5090)
# ─────────────────────────────────────────────

volumes:
  hf-hub-cache:      # Shared HuggingFace model cache across all services
  ollama_data:       # Persists Ollama downloaded models
  postgres_data:     # Persists PostgreSQL data
  redis_data:        # Persists Redis data

networks:
  ai-net:
    driver: bridge

services:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Ollama — Llama 3.1 8B (replaces vLLM, works on RTX 5090 out of the box)
  # ──────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Ollama Init — pulls Llama 3.1 8B on first start then exits
  # ──────────────────────────────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5 &&
        ollama pull llama3.1:8b &&
        echo '✅ Llama 3.1 8B ready'
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    networks:
      - ai-net
    depends_on:
      ollama:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Speaches — STT (Faster-Whisper) + TTS (Piper)
  # ──────────────────────────────────────────────────────────────────────────
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda #speaches-blackwell 
    container_name: speaches
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      # STT — Faster-Whisper
      WHISPER__MODEL: Systran/faster-whisper-large-v3
      WHISPER__COMPUTE_TYPE: float16        # ✅ float16 required on Blackwell (int8 crashes, float32 wastes VRAM)
      # WHISPER__DEVICE: cuda
      WHISPER__INFERENCE_DEVICE: cuda

      # TTS — Piper
      TTS__MODEL: speaches-ai/piper-es_ES-sharvard-medium
      TTS__VOICE: sharvard

      # ONNX Runtime — force CUDA execution provider
      ONNX_PROVIDER: CUDAExecutionProvider
      ONNXRUNTIME_CUDA_DEVICE_ID: "0"

      # CUDA / GPU visibility
      CUDA_VISIBLE_DEVICES: "0"
      PRELOAD_MODELS: '["Systran/faster-whisper-large-v3", "speaches-ai/piper-es_ES-sharvard-medium"]'

      OMP_NUM_THREADS: "1"
      ORT_NUM_THREADS: "1"

      # Fix ORT thread affinity in LXC — disable inter-op parallelism
      UNSTABLE_ORT_OPTS__PROVIDER_OPTS: >-
        {"CUDAExecutionProvider": {"device_id": "0", "arena_extend_strategy": "kNextPowerOfTwo", "cudnn_conv_algo_search": "EXHAUSTIVE", "do_copy_in_default_stream": "1"}}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s


  # ──────────────────────────────────────────────────────────────────────────
  # 4. Speaches Init — downloads STT + TTS models using curl
  #    Uses: curl
  #    Runs once then exits. Models cached in hf-hub-cache volume.
  # ──────────────────────────────────────────────────────────────────────────
  speaches-init:
    image: ghcr.io/speaches-ai/speaches:latest-cuda #speaches-blackwell
    container_name: speaches-init
    restart: "no"
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      SPEACHES_BASE_URL: http://speaches:8000
    networks:
      - ai-net
    depends_on:
      speaches:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo '⬇️  Downloading + loading Whisper large-v3...' &&
        curl -sf -X POST http://speaches:8000/v1/models/Systran/faster-whisper-large-v3 &&
        echo '✅ Whisper ready' &&

        echo '⬇️  Downloading + loading Piper TTS...' &&
        curl -sf -X POST http://speaches:8000/v1/models/speaches-ai/piper-es_ES-sharvard-medium &&
        echo '✅ Piper ready' &&

        echo '🎉 All models ready. Loaded models:' &&
        curl -s "http://speaches:8000/v1/models" | python3 -m json.tool



  # ──────────────────────────────────────────────────────────────────────────
  # 3. FastAPI — Voice pipeline + Twilio webhooks
  # ──────────────────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: fastapi/Dockerfile
    image: voice-fastapi:latest
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./fastapi/static:/app/static    # TTS output audio files
    environment:
      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      # BASE_URL is auto-resolved from ngrok at runtime (see ngrok service)
      DOMAIN: ${DOMAIN}
      # Override here only if using a static domain: BASE_URL: https://yourdomain.com
      NGROK_API_URL: http://ngrok:4040/api/tunnels
      # Internal service URLs (Docker network DNS)
      
      # VAD
      VAD_BASE_URL: ${VAD_BASE_URL}

      # ── TTS ────────────────────────────────────────────────────────────────
      TTS_BASE_URL: ${TTS_BASE_URL}
      TTS_MODEL: ${TTS_MODEL}
      TTS_VOICE: ${TTS_VOICE}

      # ── STT ────────────────────────────────────────────────────────────────
      STT_BASE_URL: ${STT_BASE_URL}
      STT_MODEL: ${STT_MODEL}
      STT_LANGUAGE: ${STT_LANGUAGE}
      STT_API_KEY: ${GROQ_API_KEY}

      # ── LLM ────────────────────────────────────────────────────────────────
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${GROQ_API_KEY}

      # ── Google Search Tool ──────────────────────────────────────────────────────────
      SERPER_API_KEY: ${SERPER_API_KEY}

      # ── LangFuse Tracing ──────────────────────────────────────────────────────────
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
    depends_on:
      ollama:
        condition: service_healthy
      speaches:
        condition: service_healthy
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s


  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: voice-gateway:latest
    container_name: gateway
    restart: unless-stopped
    networks:
      - ai-net 
    ports:
      - "8080:8080"
      - "5678:5678"
    environment:
      
      # BASE_URL is auto-resolved from ngrok at runtime (see ngrok service)
      DOMAIN: ${DOMAIN}
      # Override here only if using a static domain: BASE_URL: https://yourdomain.com
      NGROK_API_URL: http://ngrok:4040/api/tunnels
      # Internal service URLs (Docker network DNS)

      # ── Database ──────────────────────────────────────────────────────────
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # ── Redis ──────────────────────────────────────────────────────────
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}  
      REDIS_URL: "redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}"

      # ── Cloudflare ──────────────────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}

      # ── JWT ──────────────────────────────────────────────────────────
      GATEWAY_SECRET_KEY: ${GATEWAY_SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      TOKEN_EXPIRATION_SECONDS: ${TOKEN_EXPIRATION_SECONDS}
    volumes:
      - ./gateway:/app/gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health/ping')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "
      pip install debugpy &&
      python -m debugpy --listen 0.0.0.0:5678 -m uvicorn gateway.main:app --host 0.0.0.0 --port 8080 --reload
      "

  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: voice-worker:latest
    container_name: worker-1
    restart: unless-stopped
    networks:
      - ai-net 
    environment:

      # ── LangFuse Tracing ──────────────────────────────────────────────────────────
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
      
      # ── Database ──────────────────────────────────────────────────────────
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # ── Redis ──────────────────────────────────────────────────────────
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}  
      REDIS_URL: "redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}"

      # ── Cloudflare ──────────────────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}

      # ── Config ──────────────────────────────────────────────────────────
      TIER: standard
      REGION: eu-west-1


    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Otorga 30 segundos al script para que limpie Redis y cierre WebRTC de forma elegante
    stop_grace_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # 4. ngrok — Exposes the unified reverse proxy publicly (Free Tier Friendly)
  # ──────────────────────────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    command: http nginx:80 --domain=${NGROK_DOMAIN} --log=stdout
    ports:
      - "4040:4040"                     # ngrok inspector UI → http://localhost:4040
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    networks:
      - ai-net
    depends_on:
      nginx:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Reverse Proxy — Splits single-domain traffic based on path rules
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    networks:
      - ai-net
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat << 'EOF' > /etc/nginx/conf.d/default.conf
        server {
            listen 80;
            server_name _;

            # Maximize upload size for large voice/audio payloads if needed
            client_max_body_size 50M;

            # Embedded Docker DNS Server
            resolver 127.0.0.11 valid=10s;

            # Set backend destinations as variables to prevent boot-time panic
            set $$gateway_url "http://gateway:8080";
            set $$fastapi_url "http://fastapi:8081";

            # Route 1: Forward Gateway API requests
            location /v1/ {
                proxy_pass $$gateway_url;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                
                # Crucial for WebRTC / WebSockets (Voice Stack)
                proxy_http_version 1.1;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection "upgrade";
                
                # Disable buffering for low-latency streaming responses
                proxy_buffering off;
            }

            # Route 2: Native Gateway API documentation paths
            location /docs {
                proxy_pass $$gateway_url;
                proxy_set_header Host $$host;
            }
            location /openapi.json {
                proxy_pass $$gateway_url;
                proxy_set_header Host $$host;
            }

            # Route 3: Default fallback to FastAPI (Twilio webhooks, etc.)
            location / {
                proxy_pass $$fastapi_url;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                
                # Ensure streaming audio responses work instantly
                proxy_buffering off;
                proxy_read_timeout 300s;
            }
        }
        EOF
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-net 
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "${REDIS_PORT}", "ping"]
      interval: 5s
      timeout: "3s"
      retries: 5
    command:
      - redis-server
      - --save
      - "60 1"
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD}
      - --port
      - ${REDIS_PORT}

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - ai-net 
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  

  init_db:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: gateway/Dockerfile
    volumes:
      - ./gateway:/app/gateway 
    command: python /app/gateway/db/init_db.py
    networks:
      - ai-net 
    depends_on:
      - postgres
    environment:
      # ─── ADD THIS LINE TO FIX THE PATH ERROR ───
      PYTHONPATH: /app
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # ── Cloudflare ──────────────────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}


  seed_db:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: gateway/Dockerfile
    volumes:
      - ./gateway:/app/gateway 
    # Points python directly to your execution entry point
    command: python /app/gateway/db/seed.py
    networks:
      - ai-net 
    depends_on:
      init_db:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # ── Cloudflare ──────────────────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      DOMAIN: ${DOMAIN}
