name: voice-ai-stack-prod


networks:
  ai-net:
    driver: bridge

services:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. API Gateway
  # ──────────────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: voice-gateway:latest
    container_name: gateway
    restart: unless-stopped
    networks:
      - ai-net 
    ports:
      - "8080:8080"
    environment:
      DOMAIN: ${DOMAIN}

      # ── Database ──────────────────────────────────────────────────────────
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

      # ── Redis ──────────────────────────────────────────────────────────
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}  
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB}"

      # ── Cloudflare / Security ─────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      GATEWAY_SECRET_KEY: ${GATEWAY_SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      TOKEN_EXPIRATION_SECONDS: ${TOKEN_EXPIRATION_SECONDS}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health/ping')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Worker 1
  # ──────────────────────────────────────────────────────────────────────────
  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: voice-worker:latest
    container_name: worker-1
    restart: unless-stopped
    networks:
      - ai-net 
    environment:

      # ── TTS ────────────────────────────────────────────────────────────────
      TTS_BASE_URL: ${TTS_BASE_URL}
      TTS_MODEL: ${TTS_MODEL}
      TTS_VOICE: ${TTS_VOICE}
      TTS_API_KEY: ${TTS_API_KEY}

      # ── STT ────────────────────────────────────────────────────────────────
      STT_BASE_URL: ${STT_BASE_URL}
      STT_MODEL: ${STT_MODEL}
      STT_LANGUAGE: ${STT_LANGUAGE}
      STT_API_KEY: ${STT_API_KEY}

      # ── LLM ────────────────────────────────────────────────────────────────
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}

      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
      
      # ── Database ──────────────────────────────────────────────────────────
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

      # ── Redis ──────────────────────────────────────────────────────────
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}  
      REDIS_URL: "redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}"

      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      TIER: ${TIER}
      REGION: ${REGION}
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s

  

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Database Utilities (Triggered via Profiles)
  # ──────────────────────────────────────────────────────────────────────────
  init_db:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: gateway/Dockerfile
    networks:
      - ai-net 
    depends_on:
      - postgres
    command: python /app/gateway/db/init_db.py
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}

  seed_db:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: gateway/Dockerfile
    networks:
      - ai-net 
    depends_on:
      init_db:
        condition: service_completed_successfully
    command: python /app/gateway/db/seed.py
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      DOMAIN: ${DOMAIN}